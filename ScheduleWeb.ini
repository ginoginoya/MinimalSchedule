[Rainmeter]
Update=-1
AccurateText=1

[Variables]
@Include=#CURRENTPATH#DataWeb.inc

[Metadata]
Name=Minimal Schedule Web
Author=Antigravity
Information=WebView2 powered schedule dashboard
Version=1.8.0

[WebView2]
Measure=Plugin
Plugin=WebView2
URL=#@#Web\index.html
W=980
H=900
ZoomFactor=1.0
DynamicVariables=1

[Background_Shape]
Meter=Shape
Shape=Rectangle 0,0,980,900 | StrokeWidth 0 | FillColor 0,0,0,1
RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Open DevTools
ContextAction=[!CommandMeasure WebView2 "Open DevTools"]
ContextTitle2=Reload
ContextAction2=[!Refresh]
DynamicVariables=1
